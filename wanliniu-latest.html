<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>经营看板</title>
<style>
:root { --bg:#f3f5f7; --panel:#fff; --ink:#17202a; --muted:#667085; --line:#d9e0e8; --dark:#132235; --blue:#1f5fbf; --green:#0f7b57; --red:#be3b31; --amber:#a76a13; --shadow:0 12px 30px rgba(19,34,53,.08); }
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink); }
main { max-width:1380px; margin:0 auto; padding:24px; }
.title { background:linear-gradient(135deg,#132235,#21415f); color:#fff; border-radius:8px; padding:24px; margin-bottom:18px; box-shadow:var(--shadow); }
.title h1 { margin:0; font-size:28px; }
.controls,.metrics,.layout { display:grid; gap:12px; }
.controls { grid-template-columns:1.2fr 1fr 1fr 1fr; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; margin-bottom:18px; box-shadow:0 6px 16px rgba(19,34,53,.04); }
.field label { display:block; color:var(--muted); font-size:12px; margin-bottom:7px; }
select,input { width:100%; height:38px; border:1px solid var(--line); border-radius:6px; padding:0 10px; background:#fff; color:var(--ink); outline:none; }
input[type="date"] { cursor:pointer; color-scheme:light; }
select:focus,input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(31,95,191,.12); }
.date-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.quick { grid-column:1/-1; display:flex; gap:8px; flex-wrap:wrap; }
button { height:34px; border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--ink); cursor:pointer; padding:0 11px; }
button.active,button:hover { background:var(--dark); border-color:var(--dark); color:#fff; }
button { transition:background .16s ease,border-color .16s ease,color .16s ease,transform .16s ease,box-shadow .16s ease; }
button.active { box-shadow:0 7px 16px rgba(19,34,53,.18); transform:translateY(-1px); }
.metrics { grid-template-columns:repeat(4,minmax(0,1fr)); margin-bottom:18px; }
.metric,.panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:0 8px 22px rgba(19,34,53,.05); }
.metric { padding:15px; min-height:96px; transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease; }
.metric.chart-metric { cursor:pointer; position:relative; }
.metric.chart-metric:hover { transform:translateY(-2px); border-color:#b8c7d9; box-shadow:0 12px 28px rgba(19,34,53,.09); }
.metric.chart-metric.active { border-color:#132235; background:linear-gradient(180deg,#fff,#f7f9fc); box-shadow:0 14px 32px rgba(19,34,53,.12); }
.metric.chart-metric.active::after { content:"已联动"; position:absolute; right:12px; top:12px; border-radius:999px; padding:3px 8px; background:#132235; color:#fff; font-size:11px; font-weight:650; }
.metric span { display:block; color:var(--muted); font-size:12px; }
.metric strong { display:block; margin-top:10px; font-size:22px; }
.metric em { display:block; margin-top:8px; color:var(--muted); font-size:12px; font-style:normal; }
.metric em.up { color:var(--green); } .metric em.down { color:var(--red); }
.layout { grid-template-columns:2fr 1fr; }
.panel { padding:18px; margin-bottom:18px; }
.panel-head { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:12px; }
h2,h3 { margin:0; }
.trend-toolbar { display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap; margin:0 0 10px; }
.trend-hint { color:var(--muted); font-size:12px; }
.trend-legend { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.legend-pill { display:inline-flex; align-items:center; gap:7px; height:28px; border:1px solid var(--line); border-radius:999px; padding:0 10px; background:#fff; color:#4d5b6a; font-size:12px; font-weight:650; }
.legend-mark { width:18px; height:3px; border-radius:999px; background:var(--c); box-shadow:0 0 0 3px rgba(19,34,53,.06); }
.legend-mark.bar-mark { width:16px; height:11px; border-radius:3px; background:rgba(31,95,191,.28); border:1px solid #1f5fbf; box-shadow:none; }
.chart-wrap { position:relative; }
.chart { height:310px; width:100%; cursor:crosshair; }
.chart-tip { display:none; position:absolute; z-index:5; min-width:190px; pointer-events:none; background:#111827; color:#fff; border-radius:8px; padding:10px 12px; box-shadow:0 14px 36px rgba(17,24,39,.22); font-size:12px; line-height:1.55; }
.chart-tip strong { display:block; margin-bottom:4px; font-size:13px; }
.share-list,.insight-list { display:grid; gap:8px; }
.share-row { display:grid; grid-template-columns:minmax(150px,1fr) minmax(150px,1.2fr) 64px; gap:10px; align-items:center; font-size:13px; border:1px solid transparent; border-radius:8px; padding:7px 8px; margin:0 -8px; transition:transform .18s ease,box-shadow .18s ease,background .18s ease,border-color .18s ease; transform-origin:left center; }
.share-row:hover { transform:scale(1.025); background:#fff; border-color:#cbd7e5; box-shadow:0 10px 24px rgba(19,34,53,.11); z-index:2; }
.share-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bar { height:9px; border-radius:999px; background:#edf1f5; overflow:hidden; }
.bar i { display:block; height:100%; background:linear-gradient(90deg,#2563eb,#138a5b); width:var(--w); transition:filter .18s ease,transform .18s ease; transform-origin:left center; }
.share-row:hover .bar i { filter:saturate(1.25) brightness(1.06); transform:scaleX(1.03); }
.insight { border:1px solid var(--line); border-left:3px solid #b9c7d8; border-radius:8px; padding:10px; background:#fafbfc; }
.insight.good { border-left-color:var(--green); } .insight.bad { border-left-color:var(--red); } .insight.neutral { border-left-color:#8aa0b8; }
.insight strong { display:block; font-size:13px; }
.insight span { display:block; color:var(--muted); font-size:12px; margin-top:5px; line-height:1.45; }
table { width:100%; border-collapse:collapse; font-size:13px; background:#fff; }
th,td { border-bottom:1px solid var(--line); padding:10px 9px; text-align:right; white-space:nowrap; }
th:first-child,td:first-child { text-align:left; }
th { color:var(--muted); background:#f9fafb; position:sticky; top:0; cursor:pointer; }
th.sortable::after { content:" ↕"; color:#9aa6b2; font-size:11px; }
.table-wrap { max-height:560px; overflow:auto; border:1px solid var(--line); border-radius:8px; }
.up { color:var(--green); font-weight:650; } .down { color:var(--red); font-weight:650; }
.pill { display:inline-block; border-radius:999px; padding:4px 9px; font-size:12px; font-weight:650; background:#eef4ff; color:#1d4ed8; }
.pill.red { background:#fdebea; color:var(--red); } .pill.amber { background:#fff4e3; color:var(--amber); } .pill.green { background:#e8f7ef; color:var(--green); }
@media(max-width:980px) { .controls,.layout { grid-template-columns:1fr; } .metrics { grid-template-columns:repeat(2,1fr); } }
@media(max-width:560px) { main { padding:14px; } .metrics,.date-grid,.share-row { grid-template-columns:1fr; } }
</style>
</head>

function parseManualDate(value) { const candidate=String(value||'').trim(); if(!/^\d{4}-\d{2}-\d{2}$/.test(candidate)) return ''; const dt=new Date(`${candidate}T00:00:00`), [y,m,d]=candidate.split('-').map(Number); if(dt.getFullYear()!==y || dt.getMonth()+1!==m || dt.getDate()!==d) return ''; return candidate; }

function setYesterday() { const d=new Date(); d.setDate(d.getDate()-1); const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); const target=`${y}-${m}-${day}`; if(year.value && year.value!==y) year.value=y; if(allDates.includes(target)) { setDateRange(target, target); } else { setDateRange('', ''); } setActiveQuick('yesterday'); refresh(); }
function refresh() { if(activeQuick===null) setActiveQuick(detectQuick()); rangeLabel.textContent=rangeText(); hoverPoint=null; renderCards(); renderTable(); renderShare(); renderAnalysis(); drawChart(); }
document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>{ if(b.dataset.yesterday) setYesterday(); else setQuick(Number(b.dataset.days)); });
shop.onchange=()=>{ activeQuick=null; refresh(); }; [start,end].forEach(el=>{ el.onchange=applyManualDates; el.onkeydown=e=>{ if(e.key==='Enter') applyManualDates(); }; }); [year,month].forEach(el=>el.onchange=applyYearMonth);
window.addEventListener('resize',()=>drawChart());
renderYearMonth(); bindChartHover(); refresh();
</script>

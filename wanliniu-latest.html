<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>公开脱敏经营看板</title>
<style>
:root { --ink:#17202a; --muted:#667085; --line:#d8e0e8; --panel:#fff; --bg:#f5f7fa; --blue:#2563eb; --green:#16845b; --red:#c24135; --amber:#a66b00; --dark:#10233a; }
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink); }
main { max-width:1180px; margin:0 auto; padding:24px; }
.hero { background:var(--dark); color:#fff; border-radius:8px; padding:22px 24px; margin-bottom:16px; }
.hero h1 { margin:0; font-size:26px; letter-spacing:0; }
.hero p { margin:8px 0 0; color:#d7e3ef; line-height:1.5; }
.controls,.cards,.grid { display:grid; gap:12px; }
.controls { grid-template-columns:1.2fr 1fr 1fr; background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; margin-bottom:16px; }
label { display:block; color:var(--muted); font-size:12px; margin-bottom:7px; }
select,input { width:100%; height:38px; border:1px solid var(--line); border-radius:6px; padding:0 10px; background:#fff; color:var(--ink); }
.cards { grid-template-columns:repeat(4,minmax(0,1fr)); margin-bottom:16px; }
.card,.panel { background:#fff; border:1px solid var(--line); border-radius:8px; box-shadow:0 8px 22px rgba(16,35,58,.05); }
.card { padding:15px; min-height:96px; }
.card span { display:block; color:var(--muted); font-size:12px; }
.card strong { display:block; margin-top:10px; font-size:24px; }
.card em { display:block; margin-top:7px; color:var(--muted); font-size:12px; font-style:normal; line-height:1.45; }
.grid { grid-template-columns:2fr 1fr; }
.panel { padding:18px; margin-bottom:16px; }
.panel h2 { margin:0 0 12px; font-size:16px; }
canvas { width:100%; height:auto; display:block; }
.note { border-left:3px solid var(--amber); background:#fff8eb; padding:10px 12px; border-radius:8px; color:#5e4200; line-height:1.55; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th,td { border-bottom:1px solid var(--line); padding:10px 8px; text-align:right; white-space:nowrap; }
th:first-child,td:first-child { text-align:left; }
th { color:var(--muted); background:#f9fafb; }
.up { color:var(--green); font-weight:700; }
.down { color:var(--red); font-weight:700; }
@media(max-width:860px) { .controls,.cards,.grid { grid-template-columns:1fr; } main { padding:16px; } }
</style>
</head>
<body>
<main>
  <section class="hero">
    <h1>公开脱敏经营看板</h1>
    <p>仅展示匿名店铺、指数趋势与环比方向；不包含店铺全名、具体金额、具体笔数、毛利或退款金额。</p>
  </section>
  <section class="controls">
    <div><label for="shop">店铺</label><select id="shop"><option value="__ALL__">全部匿名店铺</option></select></div>
    <div><label for="start">开始日期</label><input id="start" type="date"></div>
    <div><label for="end">结束日期</label><input id="end" type="date"></div>
  </section>
  <section class="cards" id="cards"></section>
  <section class="grid">
    <div class="panel"><h2>指数趋势</h2><canvas id="chart" width="900" height="360"></canvas></div>
    <aside class="panel"><h2>经营分析</h2><div class="note" id="analysis"></div></aside>
  </section>
  <section class="panel"><h2>匿名店铺表现</h2><table><thead><tr><th>匿名店铺</th><th>金额指数</th><th>笔数指数</th><th>客单指数</th></tr></thead><tbody id="rows"></tbody></table></section>
</main>

function fmt(v) { return Number(v || 0).toFixed(1); }
function renderCards(series) {
  const latest = series[series.length - 1] || {amountIndex:0, ordersIndex:0, aovIndex:0};
  cards.innerHTML = [
    ['最新日期', data.latestDate, `覆盖 ${data.coverage}/${data.expectedCoverage} 个匿名店铺`],
    ['金额指数', fmt(latest.amountIndex), `较上一日 ${data.amountChange}`],
    ['笔数指数', fmt(latest.ordersIndex), `较上一日 ${data.ordersChange}`],
    ['数据状态', data.missingCount ? '不完整' : '完整', data.missingCount ? `最新日期缺 ${data.missingCount} 个店铺` : '最新日期覆盖完整']
  ].map(x => `<div class="card"><span>${x[0]}</span><strong>${x[1]}</strong><em>${x[2]}</em></div>`).join('');
}
function draw(series) {
  const w=canvas.width,h=canvas.height,p={l:54,r:22,t:24,b:42},pw=w-p.l-p.r,ph=h-p.t-p.b;
  ctx.clearRect(0,0,w,h); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
  const max = Math.max(120, ...series.flatMap(d => [d.amountIndex,d.ordersIndex,d.aovIndex]));
  ctx.strokeStyle='#e5ebf1'; ctx.lineWidth=1; ctx.font='13px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
  for (let i=0;i<=4;i++) { const y=p.t+ph*i/4; ctx.beginPath(); ctx.moveTo(p.l,y); ctx.lineTo(w-p.r,y); ctx.stroke(); ctx.fillStyle='#667085'; ctx.fillText(fmt(max*(1-i/4)), 8, y+4); }
  function line(key,color) { ctx.beginPath(); series.forEach((d,i)=>{ const x=p.l+pw*i/Math.max(series.length-1,1); const y=p.t+ph-ph*d[key]/max; if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.strokeStyle=color; ctx.lineWidth=3; ctx.stroke(); }
  line('amountIndex','#2563eb'); line('ordersIndex','#16845b'); line('aovIndex','#a66b00');
  ctx.fillStyle='#667085'; series.forEach((d,i)=>{ if(i%Math.ceil(series.length/8)===0 || i===series.length-1) { const x=p.l+pw*i/Math.max(series.length-1,1); ctx.fillText(d.date.slice(5), x-16, h-14); } });
}
function renderTable(rows) {
  const byShop = new Map();
  rows.forEach(r => byShop.set(r.shop, r));
  tbody.innerHTML = [...byShop.values()].sort((a,b)=>b.amountIndex-a.amountIndex).map(r => `<tr><td>${r.shop}</td><td>${fmt(r.amountIndex)}</td><td>${fmt(r.ordersIndex)}</td><td>${fmt(r.aovIndex)}</td></tr>`).join('');
}
function render() {
  const rows = filteredRows();
  const series = byDate(rows);
  renderCards(series);
  analysis.textContent = data.judgement + ' 本页面为公开脱敏版，不用于核算真实销售额、利润或投放效率。';
  renderTable(rows.filter(r => r.date === end.value));
  draw(series);
}
[shop,start,end].forEach(el => el.addEventListener('change', render));
render();
</script>
</body>
